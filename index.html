<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Getränke">
<title>Getränkezähler Pro</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,700;9..144,900&display=swap');

/* THEME */
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--border:#242424;--border2:#2e2e2e;--text:#f2ede7;--muted:#555;--muted2:#888;--green:#2ecc71;--red:#e05c5c;--gold:#d4a017;--radius:18px;--tab-h:68px;}
[data-theme="light"]{--bg:#f5f0ea;--surface:#ffffff;--surface2:#f0ebe4;--border:#e0d9d0;--border2:#ccc5bb;--text:#1a1612;--muted:#aaa;--muted2:#888;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overscroll-behavior:none;transition:background 0.3s,color 0.3s;}
body{display:flex;flex-direction:column;height:100dvh;}

/* VIEWS */
.view{display:none;flex-direction:column;flex:1;overflow:hidden;}
.view.active{display:flex;}

/* HEADER */
.app-header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;padding-top:max(14px,env(safe-area-inset-top,14px));border-bottom:1px solid var(--border);background:var(--surface);}
.app-title{font-family:'Fraunces',serif;font-size:20px;font-weight:900;letter-spacing:-0.3px;}
.app-title em{font-style:normal;opacity:0.35;}
.header-right{display:flex;align-items:center;gap:10px;}
.theme-btn{background:none;border:1px solid var(--border2);border-radius:10px;padding:5px 9px;font-size:14px;cursor:pointer;color:var(--text);}
.theme-btn:active{border-color:var(--text);}
.header-session{font-size:10px;color:var(--muted2);text-align:right;letter-spacing:0.04em;}
.header-session strong{display:block;font-size:12px;color:var(--text);}

/* TAB BAR */
.tab-bar{flex-shrink:0;display:flex;background:var(--surface);border-top:1px solid var(--border);height:var(--tab-h);padding-bottom:env(safe-area-inset-bottom,0px);}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:none;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;transition:color 0.15s;}
.tab-btn .ti{font-size:19px;line-height:1;}
.tab-btn.active{color:var(--text);}

/* SCROLL CONTENT */
.scroll{overflow-y:auto;flex:1;}
.pad{padding:14px 14px 20px;}

/* SESSION BANNER */
.sess-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sess-name{font-family:'Fraunces',serif;font-size:17px;font-weight:700;}
.sess-sub{font-size:10px;color:var(--muted2);margin-top:3px;letter-spacing:0.04em;}
.sess-total-num{font-family:'Fraunces',serif;font-size:38px;font-weight:900;line-height:1;text-align:right;}
.sess-total-price{font-size:11px;color:var(--gold);text-align:right;margin-top:2px;letter-spacing:0.04em;}
.sess-total-lbl{font-size:9px;color:var(--muted2);text-align:right;text-transform:uppercase;letter-spacing:0.08em;}

/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.drink-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 13px 11px;display:flex;flex-direction:column;gap:9px;position:relative;overflow:hidden;transition:border-color 0.2s,opacity 0.2s;}
.drink-card.disabled{opacity:0.28;pointer-events:none;}
.drink-card.active{border-color:var(--green);}
.dc-top{display:flex;justify-content:space-between;align-items:flex-start;}
.dc-left .dc-emoji{font-size:24px;line-height:1;}
.dc-left .dc-name{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted2);margin-top:3px;}
.dc-right{text-align:right;}
.dc-count{font-family:'Fraunces',serif;font-size:38px;font-weight:900;line-height:1;color:var(--green);transition:transform 0.1s;}
.dc-count.pop{transform:scale(1.22);}
.dc-price-total{font-size:10px;color:var(--gold);margin-top:1px;letter-spacing:0.03em;min-height:14px;}
.dc-btns{display:flex;gap:7px;}
.dcb{flex:1;height:44px;border:1px solid var(--border2);border-radius:12px;background:var(--bg);color:var(--text);font-size:22px;font-family:'DM Mono',monospace;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.08s;user-select:none;-webkit-user-select:none;}
.dcb:active{transform:scale(0.9);}
.dcb-m{color:var(--muted);}
.dcb-m:active{background:color-mix(in srgb,var(--red) 12%,transparent);border-color:var(--red);color:var(--red);}
.dcb-p:active{background:color-mix(in srgb,var(--green) 14%,transparent);border-color:var(--green);color:var(--green);}

/* MODALS & ADMIN BUTTONS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);backdrop-filter:blur(10px);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:28px 28px 0 0;padding:24px 20px;width:100%;max-width:480px;padding-bottom:max(24px,env(safe-area-inset-bottom,24px));}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px;}
.modal h2{font-family:'Fraunces',serif;font-size:20px;font-weight:900;margin-bottom:6px;}
.modal p{font-size:12px;color:var(--muted2);margin-bottom:18px;line-height:1.65;}
.modal-btns{display:flex;gap:10px;}
.mbtn{flex:1;padding:14px;border-radius:14px;border:1px solid var(--border2);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;text-transform:uppercase;letter-spacing:0.08em;transition:all 0.12s;}
.mbtn:active{transform:scale(0.97);}
.mbtn-cancel{background:var(--bg);color:var(--text);}
.mbtn-ok{background:var(--text);color:var(--bg);border-color:var(--text);}
.mbtn-danger{background:var(--red);color:white;border-color:var(--red);}
.modal-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;padding:12px 14px;margin-bottom:6px;}
.modal-input:focus{outline:none;border-color:var(--text);}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">Bau<em>wagen</em></div>
  <div class="header-right">
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">☀️</button>
    <div class="header-session"><strong id="hdr-sess">—</strong><span id="hdr-time">—</span></div>
  </div>
</div>

<div class="view active" id="view-counter">
  <div class="scroll"><div class="pad">
    <div class="sess-banner">
      <div>
        <div class="sess-name" id="c-sess-name">—</div>
        <div class="sess-sub" id="c-sess-sub">— Noch keine Buchungen</div>
      </div>
      <div>
        <div class="sess-total-num" id="c-total">0</div>
        <div class="sess-total-price" id="c-price">0,00 €</div>
        <div class="sess-total-lbl">Gesamt</div>
      </div>
    </div>
    <div class="cards-grid" id="cards-grid"></div>
  </div></div>
</div>

<div class="view" id="view-admin">
  <div class="scroll"><div class="pad">
    <div class="sec-label">Getränke</div>
    <div id="adm-drinks"></div>
    <button class="add-drink-btn" onclick="addDrink()">＋ Getränk hinzufügen</button>
    <button class="save-all-btn" onclick="saveAdmin()">Alle Einstellungen speichern</button>
  </div></div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-v="counter"  onclick="goTab('counter')"><span class="ti">🍺</span>Zähler</button>
  <button class="tab-btn"        data-v="admin"    onclick="goTab('admin')"><span class="ti">⚙️</span>Admin</button>
</div>

<script>
/* GLOBALS */
let drinks = [];
let session = {name:'Aktuelle Runde', entries:[]};
let theme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme',theme);

/* TAB */
function goTab(v){document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));document.getElementById('view-'+v).classList.add('active');document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelector(`.tab-btn[data-v="${v}"]`).classList.add('active');render();}
function toggleTheme(){theme=(theme==='dark'?'light':'dark');document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('theme',theme);}

/* ADMIN */
function addDrink(){drinks.push({name:'Neues Getränk',emoji:'🍺',preis:0,aktiv:true});renderAdmin();}
function renderAdmin(){const d=document.getElementById('adm-drinks');d.innerHTML='';drinks.forEach((dr,i)=>{const row=document.createElement('div');row.className='adm-row';
row.innerHTML=`<input class="ainput emoji" value="${dr.emoji}" onchange="drinks[${i}].emoji=this.value">
<input class="ainput name" value="${dr.name}" onchange="drinks[${i}].name=this.value">
<input class="ainput price" type="number" value="${dr.preis}" onchange="drinks[${i}].preis=parseFloat(this.value)">
<label><input type="checkbox" ${dr.aktiv?'checked':''} onchange="drinks[${i}].aktiv=this.checked"> aktiv</label>
<button class="adm-del" onclick="drinks.splice(${i},1);renderAdmin()">✖</button>`;d.appendChild(row);});}
function saveAdmin(){localStorage.setItem('drinks',JSON.stringify(drinks));alert('Getränke gespeichert');render();}

/* COUNTER */
function render(){const g=document.getElementById('cards-grid');g.innerHTML='';let total=0;drinks.forEach((dr,i)=>{if(!dr.aktiv)return;let count=session.entries.filter(e=>e.drink===i).length;let priceTotal=(count*dr.preis).toFixed(2);total+=parseFloat(priceTotal);
const card=document.createElement('div');card.className='drink-card';card.innerHTML=`<div class="dc-top"><div class="dc-left"><div class="dc-emoji">${dr.emoji}</div><div class="dc-name">${dr.name}</div></div><div class="dc-right"><div class="dc-count">${count}</div><div class="dc-price-total">${priceTotal} €</div></div></div><div class="dc-btns"><button class="dcb" onclick="addCount(${i})">＋</button><button class="dcb dcb-m" onclick="subCount(${i})">−</button></div>`;g.appendChild(card);});
document.getElementById('c-total').innerText=session.entries.length;document.getElementById('c-price').innerText=total.toFixed(2)+' €';}

/* ADD/SUB COUNT */
function addCount(i){session.entries.push({drink:i,time:new Date()});render();}
function subCount(i){for(let j=session.entries.length-1;j>=0;j--){if(session.entries[j].drink===i){session.entries.splice(j,1);break;}}render();}

/* STORAGE */
function load(){const s=localStorage.getItem('drinks');if(s)drinks=JSON.parse(s);renderAdmin();render();}
window.onload=load;
</script>
</body>
</html>
